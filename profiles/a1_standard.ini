# PrintOps Universal Profile for Bambu Lab A1 (Standard)
# 256mm x 256mm x 256mm Build Volume

bed_shape = 0x0,256x0,256x256,0x256
max_print_height = 256
nozzle_diameter = 0.4
gcode_flavor = marlin
retract_length = 0.8
retract_lift = 0.4

# --- FILAMENT SETTINGS ---
filament_type = PLA
filament_diameter = 1.75
extrusion_multiplier = 0.98
temperature = 220
bed_temperature = 65

# --- PRINT SETTINGS ---
layer_height = 0.2
first_layer_height = 0.2
perimeters = 3
fill_density = 15%
travel_speed = 300
perimeter_speed = 200
infill_speed = 250
filament_density = 1.24

# --- START GCODE ---
start_gcode = G28 ; Home\nG1 Z5 F3000 ; Lift
end_gcode = M104 S0 ; Turn off nozzle\nM140 S0 ; Turn off bed\nG28 X0 Y0 ; Home\nM84 ; Disable motors