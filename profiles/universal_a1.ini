# PrintOps Universal Profile for Bambu Lab A1
# This file is self-contained. It does not require local database lookups.

# --- PRINTER SETTINGS ---
bed_shape = 0x0,256x0,256x256,0x256
max_print_height = 256
nozzle_diameter = 0.4
gcode_flavor = marlin
use_relative_e_distances = 0
retract_length = 0.8
retract_lift = 0.4

# --- FILAMENT SETTINGS ---
filament_type = PLA
filament_diameter = 1.75
extrusion_multiplier = 0.98
temperature = 220
bed_temperature = 60
fan_always_on = 1

# --- PRINT SETTINGS (SPEEDS) ---
layer_height = 0.2
first_layer_height = 0.2
perimeters = 2
fill_density = 15%
travel_speed = 300
perimeter_speed = 200
infill_speed = 250
solid_infill_speed = 200

# --- START GCODE (Standard Bambu Init) ---
start_gcode = G28 ; Home all axes\nM104 S[first_layer_temperature] ; Set nozzle temp\nM140 S[first_layer_bed_temperature] ; Set bed temp\nM190 S[first_layer_bed_temperature] ; Wait for bed\nM109 S[first_layer_temperature] ; Wait for nozzle\nG1 Z5 F3000 ; Lift nozzle
end_gcode = M104 S0 ; Turn off nozzle\nM140 S0 ; Turn off bed\nG28 X0 Y0 ; Home X Y\nM84 ; Disable motors